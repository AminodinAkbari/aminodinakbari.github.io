baseURL = "https://aminodinakbari.github.io/"
theme = "PaperMod"

defaultContentLanguage = "en"
defaultContentLanguageInSubdir = true

enableRobotsTXT = true
enableEmoji    = true
enableGitInfo  = false

[pagination]
pagerSize = 10

[sitemap]
changefreq = "monthly"
priority   = 0.5

[outputs]
home = ["HTML", "RSS", "JSON"]

# ─── Global params (apply to both languages unless overridden) ───────────────
[params]
defaultTheme        = "auto"
ShowReadingTime     = false
ShowBreadCrumbs     = true
ShowCodeCopyButtons = true
author              = "Amin Akbari"
description         = "Backend Engineer specializing in Python, FastAPI, Django REST Framework, PostgreSQL, Redis, and Docker."
keywords            = ["backend engineer", "python developer", "fastapi", "django", "postgresql", "portfolio"]
canonicalURLs       = true

[[params.socialIcons]]
name = "github"
url  = "https://github.com/AminodinAkbari"

[[params.socialIcons]]
name = "email"
url  = "mailto:aminakbari.young2021@gmail.com"

